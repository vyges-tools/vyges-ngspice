name: release

# Build headless OSDI-enabled ngspice at the pinned ref and publish MULTI-ARCH
# artifacts: relocatable tar.gz per arch (GitHub Release) + a multi-arch container
# manifest (ghcr.io). Native runners (amd64 + arm64) — free on a public repo.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 46 or 46.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  IMG: ghcr.io/vyges-tools/vyges-ngspice

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            docker_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            docker_arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pin from upstream.yaml
        id: pin
        run: |
          REF=$(grep -E '^[[:space:]]*ref:' upstream.yaml | head -1 \
            | sed -E 's/.*ref:[[:space:]]*//; s/[[:space:]]*#.*//; s/"//g')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Install build deps (headless — no X)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            build-essential autoconf automake libtool libtool-bin bison flex \
            libreadline-dev libfftw3-dev git ca-certificates

      - name: Clone ngspice
        run: git clone https://git.code.sf.net/p/ngspice/ngspice /tmp/ngspice

      - name: Build bundle + tarball (arch from uname -m)
        id: bb
        env:
          NG_REF: ${{ steps.pin.outputs.ref }}
          VERSION: ${{ inputs.version }}
          OUT_DIR: ${{ github.workspace }}/dist
          NG_TREE: /tmp/ngspice
        run: |
          bash scripts/build-bundle.sh | tee /tmp/bb.log
          SHORT=$(grep -oE 'short=[0-9a-f]+' /tmp/bb.log | head -1 | cut -d= -f2)
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Smoke (bundle)
        run: bash scripts/smoke.sh "dist/vyges-ngspice-${{ inputs.version }}-g${{ steps.bb.outputs.short }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, smoke + push per-arch image
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.bb.outputs.short }}
          DA: ${{ matrix.docker_arch }}
        run: |
          docker build -f Dockerfile.runtime \
            --build-arg BUNDLE_DIR="vyges-ngspice-${VERSION}-g${SHORT}" \
            --build-arg VERSION="${VERSION}" \
            -t "$IMG:sha-${SHORT}-${DA}" dist
          bash scripts/smoke.sh "$IMG:sha-${SHORT}-${DA}"
          docker push "$IMG:sha-${SHORT}-${DA}"

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Collect both tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Derive SHORT from a tarball name
        id: sh
        run: |
          F=$(ls dist/*-linux-x86_64.tar.gz | head -1)
          SHORT=$(echo "$F" | grep -oE 'g[0-9a-f]{12}' | head -1 | sed 's/^g//')
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests (amd64 + arm64)
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.sh.outputs.short }}
        run: |
          for TAG in "sha-${SHORT}" "${VERSION}" latest; do
            docker buildx imagetools create -t "$IMG:${TAG}" \
              "$IMG:sha-${SHORT}-amd64" "$IMG:sha-${SHORT}-arm64"
          done
          docker buildx imagetools inspect "$IMG:${VERSION}"

      - name: Publish GitHub Release (both-arch tarballs)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: vyges-ngspice ${{ inputs.version }}
          body: |
            Headless (no-X), OSDI/OpenVAF-enabled ngspice (pinned ${{ inputs.version }}).
            **Multi-arch: linux/amd64 + linux/arm64.**
            - Tarballs: `…-linux-x86_64.tar.gz` / `…-linux-aarch64.tar.gz` — `source env.sh` then `ngspice`.
            - Image: `ghcr.io/vyges-tools/vyges-ngspice:${{ inputs.version }}` (multi-arch manifest).
            ngspice license (BSD-style) shipped as LICENSE.ngspice in the bundle; repo tooling Apache-2.0.
          files: dist/*.tar.gz
