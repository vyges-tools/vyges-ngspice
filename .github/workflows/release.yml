name: release

# De-facto Vyges multi-arch build: native per-arch builds + DIGEST-based manifest
# merge -> clean tags only (:sha-<short> / :<version> / :latest, multi-arch; NO
# intermediate per-arch tags, NO attestation entries). Native runners, public repo.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 46)"
        required: true

permissions:
  contents: write
  packages: write

env:
  IMG: ghcr.io/vyges-tools/vyges-ngspice

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            docker_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            docker_arch: arm64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pin from upstream.yaml
        id: pin
        run: |
          REF=$(grep -E '^[[:space:]]*ref:' upstream.yaml | head -1 \
            | sed -E 's/.*ref:[[:space:]]*//; s/[[:space:]]*#.*//; s/"//g')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Install build deps (headless — no X)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            build-essential autoconf automake libtool libtool-bin bison flex \
            libreadline-dev libfftw3-dev git ca-certificates

      - name: Clone ngspice
        run: git clone https://git.code.sf.net/p/ngspice/ngspice /tmp/ngspice

      - name: Build bundle + tarball (arch from uname -m)
        id: bb
        env:
          NG_REF: ${{ steps.pin.outputs.ref }}
          VERSION: ${{ inputs.version }}
          OUT_DIR: ${{ github.workspace }}/dist
          NG_TREE: /tmp/ngspice
        run: |
          bash scripts/build-bundle.sh | tee /tmp/bb.log
          SHORT=$(grep -oE 'short=[0-9a-f]+' /tmp/bb.log | head -1 | cut -d= -f2)
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Smoke (bundle)
        run: bash scripts/smoke.sh "dist/vyges-ngspice-${{ inputs.version }}-g${{ steps.bb.outputs.short }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image BY DIGEST (native ${{ matrix.docker_arch }})
        env:
          VERSION: ${{ inputs.version }}
          SHORT: ${{ steps.bb.outputs.short }}
          DA: ${{ matrix.docker_arch }}
        run: |
          docker buildx build -f Dockerfile.runtime \
            --build-arg BUNDLE_DIR="vyges-ngspice-${VERSION}-g${SHORT}" \
            --build-arg VERSION="${VERSION}" \
            --platform "linux/${DA}" --provenance=false \
            --output "type=image,name=${IMG},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file /tmp/meta.json dist
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta.json)
          echo "pushed $IMG@$DIGEST"
          mkdir -p /tmp/digests && touch "/tmp/digests/${DIGEST#sha256:}"
          echo "SHORT=${SHORT}" > /tmp/short.env

      - name: Upload digest + short
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: |
            /tmp/digests/*
          if-no-files-found: error

      - name: Upload short marker
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: short
          path: /tmp/short.env

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Collect tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Collect digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Collect short marker
        uses: actions/download-artifact@v4
        with:
          name: short
          path: /tmp

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests from digests
        env:
          VERSION: ${{ inputs.version }}
        run: |
          source /tmp/short.env
          SRCS=$(for f in /tmp/digests/*; do echo -n "${IMG}@sha256:$(basename "$f") "; done)
          for TAG in "sha-${SHORT}" "${VERSION}" latest; do
            docker buildx imagetools create -t "${IMG}:${TAG}" $SRCS
          done
          docker buildx imagetools inspect "${IMG}:${VERSION}"

      - name: Publish GitHub Release (both-arch tarballs)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: vyges-ngspice ${{ inputs.version }}
          body: |
            Headless (no-X), OSDI/OpenVAF-enabled ngspice (pinned ${{ inputs.version }}).
            **Multi-arch: linux/amd64 + linux/arm64** (native builds, digest-based manifest).
            - Tarballs: `…-linux-x86_64.tar.gz` / `…-linux-aarch64.tar.gz` — `source env.sh` then `ngspice`.
            - Image: `ghcr.io/vyges-tools/vyges-ngspice:${{ inputs.version }}` (multi-arch manifest).
            ngspice license (BSD-style) shipped as LICENSE.ngspice; repo tooling Apache-2.0.
          files: dist/*.tar.gz
